# Netlify configuration — Serra Luma (static site, no build step)
[build]
  publish = "."
  command = ""

# CSS/JS are edited in place (no fingerprinted filenames), so they must always
# revalidate — otherwise browsers serve a stale stylesheet for up to a year.
# Revalidation is cheap: Netlify returns 304 when the file is unchanged.
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images change rarely — cache for a day, but still revalidate so replacements
# (same filename) propagate within 24h rather than being pinned for a year.
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Video is large and rarely changes — cache for a week, revalidating so any
# replacement still propagates. Keeps repeat-visit bandwidth down.
[[headers]]
  for = "/assets/video/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Friendly clean URLs (optional) — /estate instead of /estate.html
[[redirects]]
  from = "/estate"
  to = "/estate.html"
  status = 200

[[redirects]]
  from = "/future-chapters"
  to = "/future-chapters.html"
  status = 200

[[redirects]]
  from = "/gallery"
  to = "/gallery.html"
  status = 200

[[redirects]]
  from = "/enquire"
  to = "/enquire.html"
  status = 200

# Old URLs → new homes (preserve any shared links / SEO)
[[redirects]]
  from = "/contact"
  to = "/enquire.html"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/enquire.html"
  status = 301

[[redirects]]
  from = "/property-details"
  to = "/estate.html"
  status = 301

[[redirects]]
  from = "/property-details.html"
  to = "/estate.html"
  status = 301
